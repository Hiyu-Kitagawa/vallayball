name: Update gym availability

on:
  schedule:
    # 06:00 JST every day.
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-availability:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Fetch latest gym availability
        run: npm run check:availability

      - name: Commit updated availability data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/nagaoka-availability.json
          if git diff --cached --quiet; then
            echo "No availability changes to commit."
          else
            git commit -m "Update gym availability data"
            git push
          fi
